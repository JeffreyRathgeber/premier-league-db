<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matchday Standings</title>
</head>
<body>
    <h1>Matchday Standings</h1>

    <label for="matchday-select">Select Matchday:</label>
    <select id="matchday-select" onchange="loadStandings()"></select>

    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>Pos</th>
                <th>Team</th>
                <th>P</th>
                <th>W</th>
                <th>D</th>
                <th>L</th>
                <th>GF</th>
                <th>GA</th>
                <th>GD</th>
                <th>Pts</th>
            </tr>
        </thead>
        <tbody id="standings-body"></tbody>
    </table>

    <script src="api.js"></script>
    <script src="matchday_standings.js"></script>
</body>
</html>

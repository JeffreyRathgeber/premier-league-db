<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Premier League Referees</title>
</head>
<body>
    <h1>Premier League Referees</h1>

    <h2>Add Referee</h2>
    <input id="first_name" placeholder="First Name">
    <input id="last_name" placeholder="Last Name">
    <input id="nationality" placeholder="Nationality">
    <button onclick="createReferee()">Add Referee</button>

    <h2>Referees</h2>
    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Nationality</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="referees-body"></tbody>
    </table>

    <script src="api.js"></script>
    <script src="referees.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Premier League Managers</title>
</head>
<body>
    <h1>Premier League Managers</h1>

    <h2>Add Manager</h2>
    <input id="first_name" placeholder="First Name">
    <input id="last_name" placeholder="Last Name">
    <input id="nationality" placeholder="Nationality">
    <button onclick="createManager()">Add Manager</button>

    <h2>Managers</h2>
    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Nationality</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="managers-body"></tbody>
    </table>

    <script src="api.js"></script>
    <script src="managers.js"></script>
</body>
</html>
